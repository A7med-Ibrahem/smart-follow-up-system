<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartFollow Up | Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg-main:#F8FAFC; --bg-card:#FFFFFF; --bg-sidebar:#FFFFFF;
  --bg-input:#F1F5F9; --text-main:#0F172A; --text-muted:#64748B;
  --border:#E2E8F0; --primary:#2563EB; --primary-light:rgba(37,99,235,0.1);
  --success:#10B981; --warning:#F59E0B; --error:#EF4444;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -1px rgba(0,0,0,0.04);
  --sidebar-width:260px; --transition:0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg-main:#020617; --bg-card:#0F172A; --bg-sidebar:#0F172A;
  --bg-input:#1E293B; --text-main:#F8FAFC; --text-muted:#94A3B8;
  --border:#1E293B; --primary:#3B82F6;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg-main);color:var(--text-main);display:flex;height:100vh;overflow:hidden;transition:background-color var(--transition),color var(--transition);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}

/* ── SIDEBAR ── */
aside{width:var(--sidebar-width);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px;z-index:100;flex-shrink:0;transition:var(--transition);}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;color:var(--primary);margin-bottom:40px;text-decoration:none;}
.logo svg{width:26px;height:26px;flex-shrink:0;}
.nav-group{display:flex;flex-direction:column;gap:4px;flex:1;}
.nav-link{display:flex;align-items:center;gap:12px;padding:11px 12px;text-decoration:none;color:var(--text-muted);font-weight:500;border-radius:10px;transition:var(--transition);font-size:14px;white-space:nowrap;}
.nav-link:hover,.nav-link.active{background:var(--primary-light);color:var(--primary);}
.nav-link svg{width:18px;height:18px;flex-shrink:0;}
.nav-bottom{margin-top:auto;display:flex;flex-direction:column;gap:4px;}

/* ── MAIN ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── HEADER ── */
header{height:68px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;gap:12px;}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;color:var(--text-main);padding:6px;border-radius:8px;}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.theme-toggle{cursor:pointer;padding:7px;border-radius:9px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-main);transition:var(--transition);display:flex;align-items:center;}
.theme-toggle:hover{background:var(--bg-input);}
.avatar-btn{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:10px;transition:var(--transition);}
.avatar-btn:hover{background:var(--bg-input);}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--primary);}
.avatar-name{font-size:13px;font-weight:600;color:var(--text-main);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:24px 28px;}
.page-heading{margin-bottom:24px;}
.page-heading h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.page-heading p{color:var(--text-muted);font-size:14px;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--bg-card);padding:20px;border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);animation:fadeInUp 0.4s both;}
.stat-card:nth-child(2){animation-delay:.06s;}.stat-card:nth-child(3){animation-delay:.12s;}.stat-card:nth-child(4){animation-delay:.18s;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.stat-icon.blue{background:var(--primary-light);color:var(--primary);}
.stat-icon.green{background:rgba(16,185,129,0.1);color:var(--success);}
.stat-icon.yellow{background:rgba(245,158,11,0.1);color:var(--warning);}
.stat-icon.red{background:rgba(239,68,68,0.1);color:var(--error);}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:4px;}
.stat-value{font-size:26px;font-weight:700;}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:4px;background:var(--bg-input);padding:4px;border-radius:10px;width:fit-content;}
.filter-tab{padding:7px 16px;border-radius:7px;border:none;background:none;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:var(--transition);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;}
.filter-tab.active{background:var(--bg-card);color:var(--primary);box-shadow:var(--shadow);}
.filter-tab-badge{background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center;}
.filter-tab.active .filter-tab-badge{background:var(--primary);}
.filter-tab:not(.active) .filter-tab-badge{background:var(--text-muted);}

/* ── TABLE ── */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.section-title{font-size:15px;font-weight:700;}
.table-container{background:var(--bg-card);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow);overflow-x:auto;margin-bottom:24px;}
.table-container table{min-width:600px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:13px 18px;background:var(--bg-input);color:var(--text-muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:15px 18px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(37,99,235,0.015);transition:background .15s;}

/* ── BADGES ── */
.badge{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;}
.badge-pending{background:rgba(245,158,11,0.1);color:var(--warning);}
.badge-pending::before{background:var(--warning);}
.badge-approved{background:rgba(16,185,129,0.1);color:var(--success);}
.badge-approved::before{background:var(--success);}
.badge-rejected{background:rgba(239,68,68,0.1);color:var(--error);}
.badge-rejected::before{background:var(--error);}
.badge-active{background:var(--primary-light);color:var(--primary);}
.badge-active::before{background:var(--primary);}
.badge-inactive{background:var(--bg-input);color:var(--text-muted);}
.badge-inactive::before{background:var(--text-muted);}

/* ── ACTION BTNS ── */
.action-btns{display:flex;gap:6px;}
.act-btn{padding:6px 12px;border-radius:7px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--transition);display:flex;align-items:center;gap:4px;}
.act-approve{border-color:rgba(16,185,129,0.3);color:var(--success);background:rgba(16,185,129,0.07);}
.act-approve:hover{background:rgba(16,185,129,0.15);}
.act-reject{border-color:rgba(239,68,68,0.3);color:var(--error);background:rgba(239,68,68,0.07);}
.act-reject:hover{background:rgba(239,68,68,0.15);}
.act-toggle-active{border-color:rgba(239,68,68,0.3);color:var(--error);background:rgba(239,68,68,0.07);}
.act-toggle-active:hover{background:rgba(239,68,68,0.15);}
.act-toggle-inactive{border-color:rgba(16,185,129,0.3);color:var(--success);background:rgba(16,185,129,0.07);}
.act-toggle-inactive:hover{background:rgba(16,185,129,0.15);}

/* ── DOCTOR INFO ── */
.doctor-info{display:flex;align-items:center;gap:10px;}
.doc-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,var(--bg-input) 25%,var(--border) 50%,var(--bg-input) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;height:14px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── EMPTY ── */
.empty-state{padding:50px;text-align:center;color:var(--text-muted);}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;}
.empty-state h3{font-size:15px;font-weight:600;margin-bottom:5px;color:var(--text-main);}
.empty-state p{font-size:13px;}

/* ── PAGINATION ── */
.pagination{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-top:1px solid var(--border);}
.page-info{color:var(--text-muted);font-size:13px;}
.page-ctrls{display:flex;gap:6px;}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--bg-card);border-radius:8px;cursor:pointer;color:var(--text-muted);transition:var(--transition);}
.btn-icon:hover:not(:disabled){background:var(--bg-input);border-color:var(--primary);color:var(--primary);}
.btn-icon:disabled{opacity:.4;cursor:not-allowed;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-card);border-radius:20px;border:1px solid var(--border);width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);animation:modalIn .3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalIn{from{opacity:0;transform:scale(0.93) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{padding:22px 24px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.modal-close:hover{background:var(--bg-input);}
.modal-body{padding:0 24px;}
.modal-footer{padding:18px 24px;display:flex;gap:8px;justify-content:flex-end;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;}
.form-textarea{width:100%;padding:10px 13px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text-main);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:var(--transition);resize:vertical;min-height:90px;}
.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}

/* ── BUTTONS ── */
.btn-primary{background:var(--primary);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:var(--transition);font-family:'Inter',sans-serif;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 15px -3px rgba(37,99,235,0.4);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none!important;}
.btn-secondary{background:var(--bg-card);color:var(--text-main);border:1px solid var(--border);padding:9px 16px;border-radius:10px;font-weight:500;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:var(--transition);font-family:'Inter',sans-serif;}
.btn-secondary:hover{background:var(--bg-input);}
.btn-danger{background:rgba(239,68,68,0.08);color:var(--error);border:1px solid rgba(239,68,68,0.2);padding:9px 16px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:var(--transition);font-family:'Inter',sans-serif;}
.btn-danger:hover{background:rgba(239,68,68,0.15);}

/* ── TOAST ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--bg-card);border:1px solid var(--border);padding:12px 16px;border-radius:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;min-width:260px;transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);}
.toast.show{transform:translateX(0);}
.toast.success{border-left:3px solid var(--success);}
.toast.error{border-left:3px solid var(--error);}
.toast.warning{border-left:3px solid var(--warning);}
.toast-msg{flex:1;font-size:13px;font-weight:500;}
.toast-x{background:none;border:none;cursor:pointer;color:var(--text-muted);}

/* ── RESPONSIVE ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:1024px){aside{width:72px;padding:20px 10px;}.logo span,.nav-link span,.avatar-name{display:none;}.logo{justify-content:center;}.nav-link{justify-content:center;}}
@media(max-width:768px){
  aside{position:fixed;left:-100%;top:0;height:100%;width:250px;padding:24px;transition:left var(--transition);z-index:200;}
  aside.open{left:0;}.logo span,.nav-link span{display:flex;}.nav-link{justify-content:flex-start;}
  .mobile-menu-btn{display:flex;}.sidebar-overlay.open{display:block;}
  .content{padding:16px;}.stats-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr;}.avatar-name{display:none;}.filter-tabs{width:100%;}.filter-tab{flex:1;justify-content:center;}}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside id="sidebar">
  <a href="#" class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    <span>SmartFollow</span>
  </a>
  <nav class="nav-group">
    <a href="#" class="nav-link active" onclick="setPage('overview',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      <span>Overview</span>
    </a>
    <a href="#" class="nav-link" onclick="setPage('requests',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Doctor Requests</span>
    </a>
    <a href="#" class="nav-link" onclick="setPage('doctors',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      <span>Manage Doctors</span>
    </a>
    <a href="#" class="nav-link" onclick="setPage('patients',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>All Patients</span>
    </a>
  </nav>
  <div class="nav-bottom">
    <a href="login.html" class="nav-link" onclick="logout(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Logout</span>
    </a>
  </div>
</aside>

<!-- MAIN -->
<main>
  <header>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span style="font-size:15px;font-weight:600;color:var(--text-muted)" id="pageLabel">Overview</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle">
        <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="avatar-btn">
        <img src="https://ui-avatars.com/api/?name=Admin&background=2563EB&color=fff&size=80" class="avatar" alt="Admin"/>
        <span class="avatar-name">Admin</span>
      </button>
    </div>
  </header>

  <div class="content" id="mainContent">
    <!-- Rendered by JS -->
  </div>
</main>

<!-- REJECT MODAL -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Reject Request</span>
      <button class="modal-close" onclick="closeModal('rejectModal')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px">Please provide a reason for rejecting this request. It will be sent to the applicant via email.</p>
      <div class="form-group">
        <label class="form-label">Rejection Reason</label>
        <textarea class="form-textarea" id="rejectReason" placeholder="e.g. License number could not be verified. Please reapply with valid documentation."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('rejectModal')">Cancel</button>
      <button class="btn-danger" id="confirmRejectBtn" onclick="confirmReject()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Reject
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'https://followupsystem.runasp.net/api';
let currentPage = 'overview';
let rejectTargetId = null;
let reqFilter = 'pending';
let reqCurrentPage = 1;
let docCurrentPage = 1;

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('userRole');
  if (!token || !role) {
      window.location.href = 'login.html';
      return;
  }
  if (role !== 'Admin') {
      localStorage.clear();
      window.location.href = 'login.html';
      return;
  }
  initTheme();
  renderPage('overview');
});

// ── AUTH ──
function headers() { return {'Content-Type':'application/json','Authorization':`Bearer ${localStorage.getItem('token')}`}; }
let refreshPromise = null;
async function apiCall(url, opts={}) {
  opts.headers = headers();
  let res = await fetch(url, opts);
  if (res.status === 401) {
    const rt = localStorage.getItem('refreshToken');
    if (!rt) { logout(); return null; }
    if (!refreshPromise) {
      refreshPromise = fetch(`${API}/Auth/refresh-token`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken:rt})})
        .then(async r => {
          if (!r.ok) throw new Error('refresh_failed');
          const d = await r.json();
          localStorage.setItem('token', d.accessToken);
          if (d.refreshToken) localStorage.setItem('refreshToken', d.refreshToken);
        })
        .finally(() => { refreshPromise = null; });
    }
    try { await refreshPromise; } catch { logout(); return null; }
    res = await fetch(url, {...opts, headers:headers()});
  }
  return res;
}
function logout(e) { if(e) e.preventDefault(); localStorage.clear(); location.href='login.html'; }

      showToast('Doctor approved! Credentials sent via email.','success');
      renderRequests(document.getElementById('mainContent'), reqFilter, reqCurrentPage);
    } else {
      const d = await res?.json().catch(()=>({}));
      const errorMsg = d.message || d.title || (d.errors ? Object.values(d.errors).flat().join(', ') : 'Failed to approve.');
      showToast(errorMsg,'error');
      btn.disabled=false; btn.innerHTML='Approve';
    }
  } catch { showToast('Network error.','error'); btn.disabled=false; btn.innerHTML='Approve'; }

async function confirmReject() {
  const reason = document.getElementById('rejectReason').value.trim();
  if (!reason) { showToast('Please provide a rejection reason.','error'); return; }
  const btn = document.getElementById('confirmRejectBtn');
  btn.disabled=true; btn.innerHTML='Rejecting...';
  try {
    const res = await apiCall(`${API}/Admin/doctor-requests/${rejectTargetId}/reject`,{method:'PUT',body:JSON.stringify({rejectionReason:reason})});
    if (res&&res.ok) {
      closeModal('rejectModal');
      showToast('Request rejected. Applicant notified via email.','success');
      renderRequests(document.getElementById('mainContent'), reqFilter, reqCurrentPage);
    } else {
      const d = await res?.json().catch(()=>({}));
      const errorMsg = d.message || d.title || (d.errors ? Object.values(d.errors).flat().join(', ') : 'Failed to reject.');
      showToast(errorMsg,'error');
    }
  } catch { showToast('Network error.','error'); }
  finally { btn.disabled=false; btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Reject'; }
}

// ── PAGINATION ──
function renderPagination(prefix, page, total, pageSize, onPage) {
  const pages = Math.ceil(total/pageSize);
  const pagEl = document.getElementById(`${prefix}Pagination`);
  if (!pagEl) return;
  pagEl.style.display = total > pageSize ? '' : 'none';
  const start = Math.min((page-1)*pageSize+1, total);
  const end = Math.min(page*pageSize, total);
  document.getElementById(`${prefix}PageInfo`).textContent = `Showing ${start}–${end} of ${total}`;
  const ctrl = document.getElementById(`${prefix}PageCtrls`);
  ctrl.innerHTML = `
    <button class="btn-icon" onclick="(${onPage})(${page-1})" ${page<=1?'disabled':''}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>`;
  const arr = pages<=5 ? Array.from({length:pages},(_,i)=>i+1) : [1,'...',page,'...',pages].filter((v,i,a)=>a.indexOf(v)===i);
  arr.forEach(p => {
    if(p==='...') { ctrl.innerHTML+=`<span style="color:var(--text-muted);padding:0 4px">…</span>`; return; }
    ctrl.innerHTML+=`<button class="btn-icon ${p===page?'active':''}" style="${p===page?'background:var(--primary);color:#fff;border-color:var(--primary)':''}" onclick="(${onPage})(${p})">${p}</button>`;
  });
  ctrl.innerHTML += `
    <button class="btn-icon" onclick="(${onPage})(${page+1})" ${page>=pages?'disabled':''}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>`;
}

function initTheme(){const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);updateThemeIcon(t);}
document.getElementById('themeToggle').addEventListener('click',()=>{const cur=document.documentElement.getAttribute('data-theme');const next=cur==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('theme',next);updateThemeIcon(next);});
function updateThemeIcon(t){document.getElementById('themeIcon').innerHTML=t==='dark'?`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`:`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;}

// ── SIDEBAR ──
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}

// ── TOAST ──
function showToast(msg,type='success'){
  const c=document.getElementById('toastContainer');
  const icons={success:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,error:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,warning:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>`};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`${icons[type]||icons.success}<span class="toast-msg">${escHtml(msg)}</span><button class="toast-x" onclick="this.parentElement.remove()">×</button>`;
  c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),500);},4500);
}

// ── HELPERS ──
function renderTableSkeletons(tbody, cols, rows) {
  tbody.innerHTML = Array.from({length:rows},()=>`<tr>${Array.from({length:cols},()=>`<td><div class="skeleton" style="width:${60+Math.random()*60}px"></div></td>`).join('')}</tr>`).join('');
}
function showEmptyTable(msg='No data found.'){
  const tbody=document.getElementById('requestsBody')||document.getElementById('doctorsBody');
  if(tbody) tbody.innerHTML='';
  const el=document.getElementById('requestsEmpty')||document.getElementById('doctorsEmpty');
  if(el){el.style.display='';el.innerHTML=emptyStateHTML(msg);}
}
function emptyStateHTML(msg){return `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg><h3>Nothing here</h3><p>${msg}</p></div>`;}
function emptyInline(msg){return `<div style="padding:28px;text-align:center;color:var(--text-muted);font-size:13px">${msg}</div>`;}
function formatDate(s){if(!s)return '—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getInitials(n){return String(n||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');}
const AC=[{bg:'rgba(37,99,235,0.12)',text:'#2563EB'},{bg:'rgba(16,185,129,0.12)',text:'#10B981'},{bg:'rgba(245,158,11,0.12)',text:'#F59E0B'},{bg:'rgba(139,92,246,0.12)',text:'#8B5CF6'},{bg:'rgba(236,72,153,0.12)',text:'#EC4899'}];
function avatarColor(n){let h=0;for(const c of String(n||''))h=(h*31+c.charCodeAt(0))&0xffffffff;return AC[Math.abs(h)%AC.length];}
